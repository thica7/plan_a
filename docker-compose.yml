services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: competiscope
      POSTGRES_USER: competiscope
      POSTGRES_PASSWORD: competiscope
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competiscope -d competiscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.27.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: competiscope
      POSTGRES_PWD: competiscope
      POSTGRES_SEEDS: postgres
    ports:
      - "127.0.0.1:7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "127.0.0.1:8233:8080"
    depends_on:
      - temporal

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      ENTERPRISE_STORE_BACKEND: postgres
      ENTERPRISE_DATABASE_URL: postgresql://competiscope:competiscope@postgres:5432/competiscope?connect_timeout=5
    volumes:
      - ./runs:/app/runs
      - ./backend/db:/app/db:ro
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    command: ["python", "-m", "packages.workflows.worker"]
    environment:
      ENTERPRISE_STORE_BACKEND: postgres
      ENTERPRISE_DATABASE_URL: postgresql://competiscope:competiscope@postgres:5432/competiscope?connect_timeout=5
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: competitive-intel
    volumes:
      - ./runs:/app/runs
      - ./backend/db:/app/db:ro
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
      - temporal-ui

volumes:
  postgres-data:
