name: feature
subagent_class: FeatureCollector
description: Extract product capabilities, workflow coverage, and differentiating feature claims.
tools_allowlist:
  - web_search
  - fetch_page
  - find_official_docs
  - extract_facts
query_templates:
  - "{competitor} features"
  - "{competitor} product docs"
  - "{competitor} changelog"
max_turns: 6
source_type: webpage
output:
  prefix: web
  confidence_default: 0.85
  confidence_no_url: 0.45
  required_dimension: feature

