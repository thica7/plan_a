name: market
subagent_class: MarketLandscapeCollector
description: Extract market landscape, category segmentation, trend, benchmark, and positioning signals.
tools_allowlist:
  - web_search
  - fetch_page
  - find_official_docs
  - extract_facts
query_templates:
  - "{topic} market landscape competitors"
  - "{competitor} market position category benchmark"
  - "{competitor} analyst report market share trend"
max_turns: 6
source_type: webpage
output:
  prefix: market
  confidence_default: 0.8
  confidence_no_url: 0.4
  required_dimension: market
